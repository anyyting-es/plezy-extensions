name: Build Extensions Index

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'extensions/**'
      - 'build.js'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Builder Script
        run: node build.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: autogenerate extensions index.json" && git push)
